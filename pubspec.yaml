name: busco_driver
description: BusCo Driver App v7 — Clean Architecture
publish_to: 'none'
version: 7.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Crypto
  http: ^1.2.0
  crypto: ^3.0.3

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Storage
  flutter_secure_storage: ^9.0.0

  # Location
  geolocator: ^12.0.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Charts
  fl_chart: ^0.68.0

  # Date formatting
  intl: ^0.19.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-ExtraBold.ttf
          weight: 700
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500

  assets:
    - assets/fonts/
